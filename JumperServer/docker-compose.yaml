services:
  mysql:
    #image: mariadb:10.6
    image: swr.cn-southwest-2.myhuaweicloud.com/zqli/mariadb:10.6
    #image: registry.cn-beijing.aliyuncs.com/wangxiaochun/mariadb:10.6
    container_name: jms_mysql
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MARIADB_DATABASE: ${DB_NAME:-jumpserver}
    healthcheck:
      test: "mysql -h127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD -e 'SHOW DATABASES;'"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ${VOLUME_DIR:-./data}/mariadb/data:/var/lib/mysql
    networks:
      - net
  redis:
    #image: redis:7.0
    image: swr.cn-southwest-2.myhuaweicloud.com/zqli/redis:7.2.5
    #image: registry.cn-beijing.aliyuncs.com/wangxiaochun/redis:7.2.5
    container_name: jms_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
    healthcheck:
      test: "redis-cli -h 127.0.0.1 -a $$REDIS_PASSWORD info Replication"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ${VOLUME_DIR:-./data}/redis/data:/data
    networks:
      - net
  jumpserver:
    image: swr.cn-southwest-2.myhuaweicloud.com/zqli/jumpserver/jms_all:v4.10.16-lts
    #image: jumpserver/jms_all:v4.10.7
    #image: jumpserver/jms_all:v4.10.2
    #image: registry.cn-beijing.aliyuncs.com/wangxiaochun/jms_all:v4.6.0
    #build:
    #  context: .
    #  dockerfile: Dockerfile
    container_name: jms_all
    privileged: true
    restart: always
    environment:
      SECRET_KEY: ${SECRET_KEY:-LfFL6zB2mt4fMVq1D3hGKxxW0hopV1tlNicUHvsKJMQxsFPhBM}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-OVxLWFfTmXRd2f0e}
      LOG_LEVEL: ${LOG_LEVEL:-ERROR}
      DB_ENGINE: ${DB_HOST:-mysql} #新版要求
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-jumpserver}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      DOMAINS: ${DOMAINS:-}
    ports:
      - ${HTTP_PORT:-80}:80/tcp
      - ${SSH_PORT:-2222}:2222/tcp
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: "curl -fsL http://localhost/api/health/ > /dev/null"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    volumes:
      - ${VOLUME_DIR:-./data}/core/data:/opt/jumpserver/core/data
      - ${VOLUME_DIR:-./data}/koko/data:/opt/jumpserver/koko/data
      - ${VOLUME_DIR:-./data}/lion/data:/opt/jumpserver/lion/data
      - ${VOLUME_DIR:-./data}/chen/data:/opt/jumpserver/chen/data
      - ${VOLUME_DIR:-./data}/kael/data:/opt/jumpserver/kael/data
      - ${VOLUME_DIR:-./data}/web/log:/var/log/nginx
    networks:
      - net
networks:
  net:
    ipam:
      driver: default
      config:
        - subnet: 172.27.0.0/16